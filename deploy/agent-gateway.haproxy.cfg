global
  log stdout format raw local0
  maxconn 1024
  hard-stop-after 35s
  mworker-max-reloads 1
  tune.ssl.cachesize 0

defaults
  log global
  mode http
  option httplog
  option httpclose
  timeout connect 5s
  timeout client 30s
  timeout server 30s
  timeout http-request 10s
  timeout http-keep-alive 15s

frontend gateway_health
  bind :8080
  http-request return status 204 if { path /health }
  http-request return status 404

frontend agent_ingress
  bind :8444 ssl crt /tmp/agent-gateway.pem ca-file /etc/vps-guardian/gateway-pki/agent-ca.crt crl-file /etc/vps-guardian/gateway-pki/agent-ca.crl verify optional ssl-min-ver TLSv1.3 no-tls-tickets

  acl agent_path path_beg /api/v1/agents/
  acl bootstrap_path path -m str /api/v1/agents/bootstrap
  acl client_certificate_present ssl_c_used
  http-request deny deny_status 403 if { ssl_fc_is_resumed }
  http-request deny deny_status 404 unless agent_path
  http-request deny deny_status 403 if !client_certificate_present !bootstrap_path

  # Remove untrusted identity headers before attaching the verified DER certificate.
  http-request del-header X-Client-Cert-Fingerprint
  http-request del-header X-Forwarded-Client-Cert
  http-request del-header X-SSL-Client-Cert
  http-request del-header SSL-Client-Cert
  http-request del-header X-Guardian-Client-Certificate
  http-request del-header X-Guardian-Client-Certificate-Der
  http-request del-header X-Guardian-Proxy-Auth
  http-request set-header X-Guardian-Client-Certificate-Der %[ssl_c_der,base64] if client_certificate_present
  http-request set-header X-Guardian-Proxy-Auth __GUARDIAN_PROXY_AUTH__
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-For %[src]

  default_backend guardian_controller

backend guardian_controller
  server controller controller:8090 check inter 5s fall 2 rise 2
