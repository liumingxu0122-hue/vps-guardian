name: reload_valid_caddy
version: 1
risk_level: 1
conditions:
  - type: fault_type
    value: external_entrance_failure
prechecks:
  - type: validate_caddy
    parameters:
      target: "${config_path}"
actions:
  - type: reload_caddy
    parameters:
      target: "${config_path}"
postchecks:
  - type: local_health_check
    parameters:
      target: "${health_url}"
rollback_on_failure: true
cooldown: 30m
max_attempts: 1
