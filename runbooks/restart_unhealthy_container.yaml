name: restart_unhealthy_container
version: 1
risk_level: 1
conditions:
  - type: fault_type
    value: application_health_failed
  - type: agent_online
    value: true
prechecks: []
actions:
  - type: restart_container
    parameters:
      target: "${container}"
postchecks:
  - type: local_health_check
    parameters:
      target: "${health_url}"
rollback_on_failure: false
cooldown: 10m
max_attempts: 1
