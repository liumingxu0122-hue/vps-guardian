name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install --require-hashes -r requirements-build.lock
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: python -m pip install --no-deps --no-build-isolation -e .
      - run: ruff check .
      - run: mypy controller
      - run: sudo "$(command -v pytest)"
      - run: pip-audit --requirement requirements.lock --disable-pip
      - run: python -m pip wheel --no-deps --wheel-dir /tmp/vps-guardian-wheel .
      - run: python -m venv /tmp/vps-guardian-wheel-test
      - run: /tmp/vps-guardian-wheel-test/bin/python -m pip install --no-deps /tmp/vps-guardian-wheel/*.whl
      - run: /tmp/vps-guardian-wheel-test/bin/python -c 'import guardian; assert guardian.__version__ == "0.2.0a1"'

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.mod
      - working-directory: agent
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci --ignore-scripts
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm test
      - working-directory: web
        run: npm run build
      - working-directory: web
        run: npm audit --audit-level=high

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci --ignore-scripts
      - working-directory: web
        run: npx playwright install --with-deps chromium
      - working-directory: web
        run: npm run test:visual

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-and-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose build database controller web
